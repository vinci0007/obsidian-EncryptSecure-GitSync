name: Release Obsidian plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read plugin metadata
        id: meta
        run: |
          node -e "const fs=require('fs'); const m=require('./manifest.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'id='+m.id+'\nversion='+m.version+'\ntag=v'+m.version+'\n');"

      - name: Check release state
        id: release_state
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build release package
        if: steps.release_state.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        run: npm run release

      - name: Create version tag
        if: steps.release_state.outputs.exists == 'false' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse -q --verify "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null; then
            git tag "${{ steps.meta.outputs.tag }}"
            git push origin "${{ steps.meta.outputs.tag }}"
          fi

      - name: Upload workflow artifact
        if: steps.release_state.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}
          path: |
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.zip
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.sha256
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/manifest.json
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/main.js
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/styles.css

      - name: Publish GitHub release
        if: steps.release_state.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Secure Git Sync ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.zip
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.sha256
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/manifest.json
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/main.js
            release/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}/styles.css
